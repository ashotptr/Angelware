# ============================================================
#  Cowrie Honeypot Configuration
#  AUA CS 232/337 - Botnet Research Lab
#  VM: victim-honeypot (192.168.100.20)
# ============================================================
#
# Place at: /etc/cowrie/cowrie.cfg  OR  ~/cowrie/etc/cowrie.cfg
#
# Start:   cowrie start
# Logs:    ~/cowrie/var/log/cowrie/cowrie.json
# Monitor: tail -f ~/cowrie/var/log/cowrie/cowrie.json | python3 -m json.tool
#
# MITRE ATT&CK mappings for observed behavior:
#   System Info Discovery (T1082): uname -a, cat /proc/cpuinfo
#   Indicator Removal (T1070):     rm -f /tmp/.x
#   Command Scripting (T1059):     /bin/sh commands
#   Ingress Tool Transfer (T1105): wget, tftp download attempts
#
# PATCH (Doc 2 §4.1 Ethical Considerations):
#   Added pre-login and post-login banners to warn any accidental
#   human visitors that they have connected to a research honeypot.
#   "We have set up banners to be displayed either before (pre-login)
#    or after (post-login) an interaction, providing an additional
#    warning level."
#   The banner file paths reference files that must be created:
#     etc/issue.net     — pre-login (shown before credentials)
#     etc/motd          — post-login (shown after successful login)
# ============================================================

[honeypot]

# ── Identity (device we pretend to be) ──────────────────────
hostname             = DVR-HD2322
log_path             = var/log/cowrie
download_path        = var/lib/cowrie/downloads
share_path           = share/cowrie
state_path           = var/lib/cowrie
etc_path             = etc
contents_path        = honeyfs
fake_addr            = 192.168.100.20

# ── Pre-login warning banner (Doc 2 §4.1) ────────────────────
# Displayed BEFORE the login prompt.
# Content of etc/issue.net:
#   ************************************************************
#   *  RESEARCH HONEYPOT — AUTHORISED ACCESS ONLY             *
#   *  This system is monitored as part of a cybersecurity    *
#   *  research project (AUA CS 232/337).                     *
#   *  All activity is logged and analysed.                   *
#   *  Disconnect immediately if you reached this system      *
#   *  unintentionally.                                        *
#   ************************************************************
banner_file          = etc/issue.net

# ── Post-login warning banner (Doc 2 §4.1) ───────────────────
# Displayed AFTER a successful login (bots still get it — we log it).
# Content of etc/motd:
#   *** THIS IS A HONEYPOT RESEARCH SYSTEM ***
#   All commands you execute are being recorded and mapped to
#   MITRE ATT&CK techniques for academic research purposes.
#   Unauthorised use of computer systems is illegal.
motd                 = etc/motd

# ── SSH listener ─────────────────────────────────────────────
[backend_pool]
guest_image_path     = pool_configs

[ssh]
enabled              = true
listen_endpoints     = tcp:2222:interface=0.0.0.0
version              = SSH-2.0-OpenSSH_7.2p2 Ubuntu-4ubuntu2.10
rsa_private_key      = etc/ssh_host_rsa_key
dsa_private_key      = etc/ssh_host_dsa_key

# ── Telnet listener ───────────────────────────────────────────
[telnet]
enabled              = true
listen_endpoints     = tcp:2323:interface=0.0.0.0

# ── Authentication: accept EVERYTHING ────────────────────────
[shell]
filesystem           = ${honeypot:share_path}/fs.pickle
processes_path       = ${honeypot:share_path}/cmdoutput.json
arch                 = linux-x86_64

[auth]
enabled              = true
auth_class           = UserDB
userdb               = ${honeypot:etc_path}/userdb.txt

# ── Logging ───────────────────────────────────────────────────
[output_jsonlog]
enabled              = true
logfile              = ${honeypot:log_path}/cowrie.json

[output_textlog]
enabled              = true
logfile              = ${honeypot:log_path}/cowrie.log

# Syslog forwarding to syslog_aggregator.py (Doc 2 §3.1)
[output_syslog]
enabled              = true
address              = 192.168.100.5     # syslog_aggregator container
port                 = 5140
facility             = local0
format               = json

# ── Fake filesystem entries ───────────────────────────────────
# These make the honeypot look like a real DVR/IoT device.
# honeyfs/ contains fake file contents served to bots running:
#   cat /proc/cpuinfo, /bin/busybox, uname -a
#
# The content is set in honeypot_setup.py:
#   FAKE_CPUINFO = "system type: Atheros AR9330 ... TP-LINK TL-WR841N"
#   FAKE_UNAME   = "Linux DVR-HD2322 3.10.14 #1 ... mips GNU/Linux"
